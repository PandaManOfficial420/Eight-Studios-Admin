<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eight Studios Admin</title>

<link rel="icon" href="https://eightstudios.org/IMG_7229-removebg-preview.png">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #0a0a0a;
  color: white;
}

/* LOCK SCREEN */
#lockScreen {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle, #111, #000);
}

.lock-box {
  background: #111;
  padding: 30px;
  border-radius: 12px;
  width: 320px;
  text-align: center;
  box-shadow: 0 0 20px rgba(255,255,255,0.08);
}

.lock-box h1 {
  margin-bottom: 20px;
}

.lock-box input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border: none;
  border-radius: 6px;
}

.lock-box button {
  width: 100%;
  padding: 10px;
  background: white;
  color: black;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
}

/* DASHBOARD */
#dashboard {
  display: none;
  min-height: 100vh;
}

/* NAVBAR */
.navbar {
  background: #111;
  padding: 15px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid #222;
}

.nav-buttons {
  display: flex;
  gap: 10px;
}

.navbar button {
  padding: 8px 12px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  background: white;
  color: black;
  font-weight: bold;
}

/* CONTAINER */
.container {
  padding: 20px;
  display: grid;
  gap: 20px;
}

/* PANELS */
.panel {
  background: #111;
  padding: 15px;
  border-radius: 10px;
  border: 1px solid #222;
}

.panel h3 {
  margin-bottom: 10px;
}

/* IFRAME */
iframe {
  width: 100%;
  height: 550px;
  border: none;
  border-radius: 10px;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  border: 1px solid #333;
  padding: 8px;
  font-size: 13px;
}

th {
  background: #222;
}

/* CODE VIEWER */
pre {
  background: #000;
  padding: 15px;
  border-radius: 10px;
  overflow: auto;
  max-height: 500px;
  white-space: pre-wrap;
  font-size: 12px;
  border: 1px solid #333;
}

/* MOBILE */
@media (max-width: 768px) {

  .navbar {
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
  }

  .nav-buttons {
    width: 100%;
    justify-content: space-between;
  }

  iframe {
    height: 350px;
  }

  .lock-box {
    width: 90%;
  }
}
</style>
</head>

<body>

<!-- LOCK SCREEN -->
<div id="lockScreen">
  <div class="lock-box">
    <h1>Eight Studios Admin</h1>
    <input type="password" id="password" placeholder="Enter Password">
    <button onclick="unlock()">Unlock</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <!-- NAVBAR -->
  <div class="navbar">
    <h2>Eight Studios Admin Portal</h2>

    <div class="nav-buttons">
      <button onclick="goHome()">Home</button>
      <button onclick="lock()">Lock</button>
    </div>
  </div>

  <div class="container">

    <!-- TERMINAL -->
    <div class="panel">
      <h3>Cash Payment Terminal</h3>
      <iframe src="https://eightstudios.org/cash-payment-receiver-virtual-terminal.html"></iframe>
    </div>

    <!-- IP LOGS -->
    <div class="panel">
      <h3>IP Log Viewer</h3>

      <input 
        type="text" 
        id="searchInput" 
        placeholder="Search logs..." 
        style="width:100%; padding:10px; margin-bottom:10px; border-radius:6px; border:none;"
        onkeyup="filterTable()"
      >

      <div style="overflow:auto; max-height:500px;">
        <table>
          <thead>
            <tr>
              <th>IP</th>
              <th>Time</th>
              <th>Country</th>
              <th>Device</th>
            </tr>
          </thead>
          <tbody id="ipBody"></tbody>
        </table>
      </div>
    </div>

    <!-- SERVER.JS -->
    <div class="panel">
      <h3>server.js Viewer</h3>
      <pre id="serverCode">Loading server.js...</pre>
    </div>

    <!-- TAWK CHAT -->
    <div class="panel">
      <h3>Live Chat (Tawk Inbox)</h3>

      <iframe src="https://dashboard.tawk.to/#/inbox/69febf581262751c34a07c2a/all"></iframe>

      <div style="margin-top:10px;">
        <button onclick="openTawk()" style="
          padding:10px 12px;
          border:none;
          border-radius:6px;
          background:white;
          color:black;
          font-weight:bold;
          cursor:pointer;
        ">
          Open Chat Dashboard
        </button>
      </div>
    </div>

  </div>
</div>

<script>
let allLogs = [];
const PASSWORD = "8888";

/* UNLOCK */
function unlock() {
  const input = document.getElementById("password").value;

  if(input === PASSWORD) {
    document.getElementById("lockScreen").style.display = "none";
    document.getElementById("dashboard").style.display = "block";

    loadLogs();
    loadServerJS();
  } else {
    alert("Wrong password");
  }
}

/* LOCK */
function lock() {
  document.getElementById("lockScreen").style.display = "flex";
  document.getElementById("dashboard").style.display = "none";
}

/* HOME */
function goHome() {
  window.location.href = "https://eightstudios.org";
}

/* OPEN TAWK */
function openTawk() {
  window.open("https://dashboard.tawk.to/#/inbox/69febf581262751c34a07c2a/all", "_blank");
}

/* LOAD LOGS */
async function loadLogs() {
  try {
    const res = await fetch("https://eightstudios.org/ip-log.txt");
    const text = await res.text();

    const lines = text.trim().split("\n");

    allLogs = lines.map(line => {
      const parts = line.split("|").map(p => p.trim());
      return {
        ip: parts[0] || "",
        time: parts[1] || "",
        country: parts[2] || "",
        device: parts[3] || ""
      };
    });

    renderTable(allLogs);
  } catch (err) {
    console.error(err);
  }
}

/* TABLE */
function renderTable(data) {
  const body = document.getElementById("ipBody");
  body.innerHTML = "";

  data.forEach(log => {
    body.innerHTML += `
      <tr>
        <td>${log.ip}</td>
        <td>${log.time}</td>
        <td>${log.country}</td>
        <td>${log.device}</td>
      </tr>
    `;
  });
}

/* SEARCH */
function filterTable() {
  const value = document.getElementById("searchInput").value.toLowerCase();

  const filtered = allLogs.filter(log =>
    log.ip.toLowerCase().includes(value) ||
    log.time.toLowerCase().includes(value) ||
    log.country.toLowerCase().includes(value) ||
    log.device.toLowerCase().includes(value)
  );

  renderTable(filtered);
}

/* SERVER.JS */
async function loadServerJS() {
  try {
    const res = await fetch("https://eightstudios.org/server.js");
    const text = await res.text();
    document.getElementById("serverCode").textContent = text;
  } catch (err) {
    document.getElementById("serverCode").textContent = "Failed to load server.js";
  }
}

/* AUTO REFRESH */
setInterval(loadLogs, 10000);
</script>

</body>
</html>
