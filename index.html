<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eight Studios Admin Portal</title>

<link rel="icon" href="https://eightstudios.org/IMG_7229-removebg-preview.png">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #0a0a0a;
  color: white;
}

/* LOGIN */
#loginScreen {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle, #111, #000);
}

.login-box {
  background: #111;
  padding: 30px;
  border-radius: 12px;
  width: 320px;
  text-align: center;
  box-shadow: 0 0 20px rgba(255,255,255,0.08);
}

.login-box h1 {
  margin-bottom: 20px;
}

.login-box input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border: none;
  border-radius: 6px;
}

.login-box button {
  width: 100%;
  padding: 10px;
  background: white;
  color: black;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
}

/* DASHBOARD */
#dashboard {
  display: none;
  min-height: 100vh;
}

.navbar {
  background: #111;
  padding: 15px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid #222;
}

/* GRID */
.container {
  padding: 20px;
  display: grid;
  gap: 20px;
}

/* PANELS */
.panel {
  background: #111;
  padding: 15px;
  border-radius: 10px;
  border: 1px solid #222;
}

.panel h3 {
  margin-bottom: 10px;
}

/* IFRAME */
iframe {
  width: 100%;
  height: 550px;
  border: none;
  border-radius: 10px;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  border: 1px solid #333;
  padding: 8px;
  font-size: 13px;
}

th {
  background: #222;
}

/* CODE VIEWER */
pre {
  background: #000;
  padding: 15px;
  border-radius: 10px;
  overflow: auto;
  max-height: 500px;
  white-space: pre-wrap;
  font-size: 12px;
  border: 1px solid #333;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <h1>Eight Studios Admin</h1>
    <input type="text" id="user" placeholder="Username">
    <input type="password" id="pass" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <div class="navbar">
    <h2>Eight Studios Admin Portal</h2>
    <button onclick="logout()" style="padding:8px 12px;">Logout</button>
  </div>

  <div class="container">

    <!-- TERMINAL -->
    <div class="panel">
      <h3>Cash Payment Receiver / Virtual Terminal</h3>
      <iframe src="https://eightstudios.org/cash-payment-receiver-virtual-terminal.html"></iframe>
    </div>

    <!-- IP LOGS -->
    <div class="panel">
      <h3>IP Log Viewer (Live Table)</h3>

      <input 
        type="text" 
        id="searchInput" 
        placeholder="Search IP, time, country, device..." 
        style="width:100%; padding:10px; margin-bottom:10px; border-radius:6px; border:none;"
        onkeyup="filterTable()"
      >

      <div style="overflow:auto; max-height:500px;">
        <table>
          <thead>
            <tr>
              <th>IP</th>
              <th>Time</th>
              <th>Country</th>
              <th>Device</th>
            </tr>
          </thead>
          <tbody id="ipBody"></tbody>
        </table>
      </div>
    </div>

    <!-- SERVER JS VIEWER -->
    <div class="panel">
      <h3>server.js Viewer</h3>
      <pre id="serverCode">Loading server.js...</pre>
    </div>

  </div>
</div>

<script>
let allLogs = [];

/* LOGIN */
function login() {
  const user = document.getElementById("user").value;
  const pass = document.getElementById("pass").value;

  if(user === "admin" && pass === "1234") {
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("dashboard").style.display = "block";

    loadLogs();
    loadServerJS();
  } else {
    alert("Invalid login");
  }
}

function logout() {
  document.getElementById("loginScreen").style.display = "flex";
  document.getElementById("dashboard").style.display = "none";
}

/* LOAD IP LOGS */
async function loadLogs() {
  try {
    const res = await fetch("https://eightstudios.org/ip-log.txt");
    const text = await res.text();

    const lines = text.trim().split("\n");

    allLogs = lines.map(line => {
      const parts = line.split("|").map(p => p.trim());
      return {
        ip: parts[0] || "",
        time: parts[1] || "",
        country: parts[2] || "",
        device: parts[3] || ""
      };
    });

    renderTable(allLogs);
  } catch (err) {
    console.error("IP log error:", err);
  }
}

/* RENDER TABLE */
function renderTable(data) {
  const body = document.getElementById("ipBody");
  body.innerHTML = "";

  data.forEach(log => {
    body.innerHTML += `
      <tr>
        <td>${log.ip}</td>
        <td>${log.time}</td>
        <td>${log.country}</td>
        <td>${log.device}</td>
      </tr>
    `;
  });
}

/* SEARCH */
function filterTable() {
  const value = document.getElementById("searchInput").value.toLowerCase();

  const filtered = allLogs.filter(log =>
    log.ip.toLowerCase().includes(value) ||
    log.time.toLowerCase().includes(value) ||
    log.country.toLowerCase().includes(value) ||
    log.device.toLowerCase().includes(value)
  );

  renderTable(filtered);
}

/* SERVER.JS LOADER */
async function loadServerJS() {
  try {
    const res = await fetch("https://eightstudios.org/server.js");
    const text = await res.text();

    document.getElementById("serverCode").textContent = text;
  } catch (err) {
    document.getElementById("serverCode").textContent = "Failed to load server.js";
  }
}

/* AUTO REFRESH IP LOGS */
setInterval(loadLogs, 10000);
</script>

</body>
</html>
