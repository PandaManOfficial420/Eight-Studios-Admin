<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eight Studios Admin</title>

<link rel="icon" href="https://eightstudios.org/IMG_7229-removebg-preview.png">

<meta property="og:title" content="Eight Studios Admin Panel">
<meta property="og:description" content="Secure Eight Studios admin dashboard">
<meta property="og:image" content="https://eightstudios.org/IMG_7229-removebg-preview.png">

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Inter", sans-serif;
}

body {
  background: url("https://eightstudios.org/the-world-is-yours-ship.gif") no-repeat center center fixed;
  background-size: cover;
  color: #fff;
  min-height: 100vh;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(2px);
  z-index: -1;
}

/* LOCK SCREEN */
#lockScreen {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.lock-box {
  width: 340px;
  padding: 28px;
  border-radius: 14px;
  background: rgba(10,10,10,0.75);
  border: 1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  text-align: center;
}

.lock-box img {
  width: 60px;
  height: 60px;
  margin-bottom: 12px;
  border-radius: 10px;
}

.lock-box input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(0,0,0,0.4);
  color: white;
}

.lock-box button {
  margin-top: 10px;
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  background: white;
  color: black;
  font-weight: 600;
  cursor: pointer;
}

/* DASHBOARD */
#dashboard {
  display: none;
}

/* NAV */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 24px;
  background: rgba(10,10,10,0.75);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
}

.nav-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.nav-left img {
  width: 28px;
  height: 28px;
  border-radius: 6px;
}

.nav-left span {
  font-size: 13px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.nav-buttons {
  display: flex;
  gap: 10px;
}

.navbar button {
  padding: 8px 14px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.1);
  background: transparent;
  color: white;
  cursor: pointer;
}

.navbar button:hover {
  background: white;
  color: black;
}

/* CONTENT */
.container {
  padding: 28px;
  display: grid;
  gap: 22px;
}

.panel {
  background: rgba(10,10,10,0.7);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px;
  padding: 18px;
  backdrop-filter: blur(10px);
}

.panel h3 {
  font-size: 13px;
  text-transform: uppercase;
  margin-bottom: 12px;
}

/* BUTTON */
.btn {
  display: inline-block;
  padding: 10px 14px;
  border-radius: 8px;
  background: white;
  color: black;
  font-size: 12px;
  font-weight: 600;
  border: none;
  cursor: pointer;
}

/* IFRAME */
iframe {
  width: 100%;
  height: 520px;
  border: none;
  border-radius: 12px;
}

/* FOOTER */
.footer {
  margin-top: 40px;
  padding: 20px;
  text-align: center;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #888;
  border-top: 1px solid rgba(255,255,255,0.08);
  background: rgba(10,10,10,0.6);
  backdrop-filter: blur(10px);
}

/* MOBILE */
@media (max-width: 768px) {
  iframe { height: 320px; }
  .lock-box { width: 90%; }
}
</style>
</head>

<body>

<!-- LOCK -->
<div id="lockScreen">
  <div class="lock-box">
    <img src="https://eightstudios.org/IMG_7229-removebg-preview.png">
    <h2>Eight Studios</h2>
    <input type="password" id="password" placeholder="Password">
    <button onclick="unlock()">Unlock</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <div class="navbar">

    <div class="nav-left">
      <img src="https://eightstudios.org/IMG_7229-removebg-preview.png">
      <span>Eight Studios</span>
    </div>

    <div class="nav-buttons">
      <button onclick="goHome()">Home</button>
      <button onclick="lock()">Lock</button>
    </div>

  </div>

  <div class="container">

    <!-- TERMINAL -->
    <div class="panel">
      <h3>Cash Payment Terminal</h3>

      <iframe src="https://app.squareup.com/terminal/"></iframe>

      <!-- BUTTON UNDER IFRAME -->
      <div style="margin-top:12px; text-align:center;">
        <button class="btn"
          onclick="window.open('https://app.squareup.com/terminal/','_blank')">
          Open Terminal
        </button>
      </div>
    </div>

    <!-- STRIPE -->
    <div class="panel">
      <h3>Stripe Dashboard</h3>
      <button class="btn"
        onclick="window.open('https://dashboard.stripe.com/acct_1SO9tQPqXvDuEmoM/dashboard','_blank')">
        Open Stripe
      </button>
    </div>

    <!-- CHAT -->
    <div class="panel">
      <h3>Live Chat</h3>
      <button class="btn"
        onclick="window.open('https://dashboard.tawk.to/#/inbox/69febf581262751c34a07c2a/all','_blank')">
        Open Chat
      </button>
    </div>

  </div>

  <!-- FOOTER -->
  <div class="footer">
    © Eight Studios • Admin Panel
  </div>

</div>

<script>
const PASSWORD_HASH = "2926a2731f4b312c08982cacf8061eb14bf65c1a87cc5d70e864e079c6220731";

window.onload = () => {
  if (sessionStorage.getItem("auth") === "1") {
    document.getElementById("lockScreen").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
  }
};

async function hash(input) {
  const enc = new TextEncoder().encode(input);
  const buf = await crypto.subtle.digest("SHA-256", enc);
  return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2,"0")).join("");
}

async function unlock() {
  const input = document.getElementById("password").value;
  const hashed = await hash(input);

  if (hashed === PASSWORD_HASH) {
    sessionStorage.setItem("auth", "1");
    document.getElementById("lockScreen").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
  } else {
    alert("Wrong password");
  }
}

function lock() {
  sessionStorage.removeItem("auth");
  document.getElementById("lockScreen").style.display = "flex";
  document.getElementById("dashboard").style.display = "none";
}

function goHome() {
  window.location.href = "https://eightstudios.org";
}
</script>

</body>
</html>
