<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eight Studios Admin</title>

<link rel="icon" href="https://eightstudios.org/IMG_7229-removebg-preview.png">

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Inter", sans-serif;
}

body {
  background: url("https://eightstudios.org/the-world-is-yours-ship.gif") no-repeat center center fixed;
  background-size: cover;
  color: #fff;
  overflow-x: hidden;
}

/* DARK OVERLAY */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(2px);
  z-index: -1;
}

/* LOCK SCREEN */
#lockScreen {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.lock-box {
  width: 340px;
  padding: 28px;
  border-radius: 14px;
  background: rgba(10,10,10,0.75);
  border: 1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  text-align: center;
}

.lock-box h2 {
  font-weight: 500;
  letter-spacing: 1px;
  margin-bottom: 10px;
}

.login-hint {
  font-size: 12px;
  color: #888;
  margin-bottom: 14px;
}

.lock-box input {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(0,0,0,0.4);
  color: white;
  outline: none;
}

.lock-box button {
  margin-top: 10px;
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  background: white;
  color: black;
  font-weight: 600;
  cursor: pointer;
}

/* DASHBOARD */
#dashboard {
  display: none;
}

/* NAV */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 28px;
  background: rgba(10,10,10,0.75);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
}

.navbar h2 {
  font-size: 14px;
  letter-spacing: 2px;
  font-weight: 500;
  text-transform: uppercase;
}

.nav-buttons {
  display: flex;
  gap: 10px;
}

.navbar button {
  padding: 8px 14px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.1);
  background: transparent;
  color: white;
  font-size: 12px;
  cursor: pointer;
  transition: 0.2s;
}

.navbar button:hover {
  background: white;
  color: black;
}

/* GRID */
.container {
  padding: 28px;
  display: grid;
  gap: 22px;
}

/* PANEL */
.panel {
  background: rgba(10,10,10,0.7);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px;
  padding: 18px;
  backdrop-filter: blur(10px);
}

.panel h3 {
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 12px;
  color: #ddd;
}

/* IFRAME */
iframe {
  width: 100%;
  height: 520px;
  border: none;
  border-radius: 12px;
}

/* BUTTON */
.panel-actions {
  margin-top: 12px;
}

.link-button {
  display: inline-block;
  padding: 10px 14px;
  border-radius: 8px;
  background: white;
  color: black;
  font-size: 12px;
  font-weight: 600;
  text-decoration: none;
}

/* MOBILE */
@media (max-width: 768px) {
  iframe { height: 320px; }
  .navbar { flex-direction: column; gap: 10px; }
  .lock-box { width: 90%; }
}
</style>
</head>

<body>

<!-- LOCK SCREEN -->
<div id="lockScreen">
  <div class="lock-box">
    <h2>Eight Studios</h2>
    <p class="login-hint">Admin Access Required</p>
    <input type="password" id="password" placeholder="Password">
    <button onclick="unlock()">Unlock</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <div class="navbar">
    <h2>Eight Studios Admin</h2>
    <div class="nav-buttons">
      <button onclick="goHome()">Home</button>
      <button onclick="lock()">Lock</button>
    </div>
  </div>

  <div class="container">

    <!-- TERMINAL -->
    <div class="panel">
      <h3>Cash Terminal</h3>
      <iframe src="https://eightstudios.org/cash-payment-receiver-virtual-terminal.html"></iframe>
      <div class="panel-actions">
        <a class="link-button" href="https://eightstudios.org/cash-payment-receiver-virtual-terminal.html" target="_blank">
          Open Full Page
        </a>
      </div>
    </div>

    <!-- LIVE CHAT -->
    <div class="panel">
      <h3>Live Chat</h3>
      <a class="link-button" href="https://dashboard.tawk.to/#/inbox/69febf581262751c34a07c2a/all" target="_blank">
        Open Chat
      </a>
    </div>

  </div>
</div>

<script>
const PASSWORD_HASH = "2926a2731f4b312c08982cacf8061eb14bf65c1a87cc5d70e864e079c6220731";

async function hash(input) {
  const enc = new TextEncoder().encode(input);
  const buf = await crypto.subtle.digest("SHA-256", enc);
  return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2,"0")).join("");
}

async function unlock() {
  const input = document.getElementById("password").value;
  const hashed = await hash(input);

  if (hashed === PASSWORD_HASH) {
    document.getElementById("lockScreen").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
  } else {
    alert("Wrong password");
  }
}

function lock() {
  document.getElementById("lockScreen").style.display = "flex";
  document.getElementById("dashboard").style.display = "none";
}

function goHome() {
  window.location.href = "https://eightstudios.org";
}
</script>

</body>
</html>
