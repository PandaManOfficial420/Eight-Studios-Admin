<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eight Studios Admin</title>

<link rel="icon" href="https://eightstudios.org/IMG_7229-removebg-preview.png">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #0a0a0a;
  color: white;
}

/* LOCK SCREEN */
#lockScreen {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle, #111, #000);
}

.lock-box {
  background: #111;
  padding: 30px;
  border-radius: 12px;
  width: 320px;
  text-align: center;
  box-shadow: 0 0 20px rgba(255,255,255,0.08);
}

.lock-box input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border: none;
  border-radius: 6px;
}

.lock-box button {
  width: 100%;
  padding: 10px;
  background: white;
  color: black;
  border: none;
  border-radius: 6px;
  font-weight: bold;
  cursor: pointer;
}

.login-hint {
  margin-bottom: 10px;
  color: #aaa;
  font-size: 13px;
}

/* DASHBOARD */
#dashboard {
  display: none;
}

/* NAVBAR */
.navbar {
  background: #111;
  padding: 15px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid #222;
}

.nav-buttons {
  display: flex;
  gap: 10px;
}

.navbar button {
  padding: 8px 12px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  background: white;
  color: black;
  font-weight: bold;
}

/* CONTAINER */
.container {
  padding: 20px;
  display: grid;
  gap: 20px;
}

/* PANEL */
.panel {
  background: #111;
  padding: 15px;
  border-radius: 10px;
  border: 1px solid #222;
}

.panel h3 {
  margin-bottom: 10px;
}

/* IFRAME */
iframe {
  width: 100%;
  height: 550px;
  border: none;
  border-radius: 10px;
}

.panel-actions {
  margin-top: 12px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.link-button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 10px 14px;
  background: white;
  color: black;
  border: none;
  border-radius: 6px;
  font-weight: bold;
  text-decoration: none;
  cursor: pointer;
}

.embed-note {
  margin: 8px 0 0;
  color: #aaa;
  font-size: 13px;
}

/* MOBILE */
@media (max-width: 768px) {
  iframe { height: 350px; }
  .lock-box { width: 90%; }
  .navbar { flex-direction: column; gap: 10px; }
}
</style>
</head>

<body>

<!-- LOCK SCREEN -->
<div id="lockScreen">
  <div class="lock-box">
    <h2>Eight Studios Admin</h2>
    <p class="login-hint">Hint: password is 8888</p>
    <input type="password" id="password" placeholder="Enter Password">
    <button onclick="unlock()">Unlock</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <div class="navbar">
    <h2>Eight Studios Admin Portal</h2>

    <div class="nav-buttons">
      <button onclick="goHome()">Home</button>
      <button onclick="lock()">Lock</button>
    </div>
  </div>

  <div class="container">

    <!-- TERMINAL -->
    <div class="panel">
      <h3>Cash Payment Terminal</h3>
      <iframe src="https://eightstudios.org/cash-payment-receiver-virtual-terminal.html"></iframe>
      <div class="panel-actions">
        <a class="link-button" href="https://eightstudios.org/cash-payment-receiver-virtual-terminal.html" target="_blank" rel="noopener noreferrer">
          Go to main link
        </a>
      </div>
    </div>

    <!-- SERVER JS -->
    <div class="panel">
      <h3>server.js Viewer</h3>
      <pre id="serverCode">Loading...</pre>
    </div>

    <!-- TAWK CHAT -->
    <div class="panel">
      <h3>Live Chat (Tawk)</h3>
      <p class="embed-note">Tawk login does not work inside the embed, so use this button to open the chat dashboard directly.</p>
      <div class="panel-actions">
        <a class="link-button" href="https://dashboard.tawk.to/#/inbox/69febf581262751c34a07c2a/all" target="_blank" rel="noopener noreferrer">
          Open chat dashboard
        </a>
      </div>
    </div>

  </div>
</div>

<script>
/* 🔐 HASHED PASSWORD SYSTEM */
const PASSWORD_HASH = "2926a2731f4b312c08982cacf8061eb14bf65c1a87cc5d70e864e079c6220731";

async function hash(input) {
  const enc = new TextEncoder().encode(input);
  const buf = await crypto.subtle.digest("SHA-256", enc);
  return [...new Uint8Array(buf)]
    .map(b => b.toString(16).padStart(2,"0"))
    .join("");
}

async function unlock() {
  const input = document.getElementById("password").value;
  const hashed = await hash(input);

  if (hashed === PASSWORD_HASH) {
    document.getElementById("lockScreen").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    loadServerJS();
  } else {
    alert("Wrong password");
  }
}

/* LOCK */
function lock() {
  document.getElementById("lockScreen").style.display = "flex";
  document.getElementById("dashboard").style.display = "none";
}

/* HOME */
function goHome() {
  window.location.href = "https://eightstudios.org";
}

/* SERVER JS */
async function loadServerJS() {
  try {
    const r = await fetch("https://eightstudios.org/server.js");
    const t = await r.text();
    document.getElementById("serverCode").textContent = t;
  } catch {}
}
</script>

</body>
</html>
