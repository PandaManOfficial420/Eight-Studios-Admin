<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Coming Soon - Eight Studios</title>

<link rel="icon" href="https://eightstudios.org/IMG_7229-removebg-preview.png">

<meta property="og:title" content="Eight Studios - Coming Soon">
<meta property="og:description" content="Something new is on the way from Eight Studios. Stay tuned for the official launch.">
<meta property="og:image" content="https://eightstudios.org/IMG_7229-removebg-preview.png">

<style>

/* BASE */
body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: Arial, sans-serif;
  color: white;
  background: radial-gradient(circle at top, rgba(0,200,255,0.25), black 70%);
  text-align: center;
  padding-bottom: 120px;
}

.container {
  width: 100%;
  max-width: 600px;
  padding: 20px;
}

.logo {
  width: 110px;
  margin-bottom: 15px;
  max-width: 40vw;
}

h1 {
  font-size: 42px;
  margin: 10px 0;
}

p {
  opacity: 0.7;
  font-size: 14px;
}

/* BUTTONS */
button {
  margin-top: 15px;
  padding: 10px 18px;
  border: none;
  border-radius: 30px;
  background: linear-gradient(135deg, #00c8ff, #0077ff);
  color: white;
  cursor: pointer;
  font-weight: bold;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
}

/* EMAIL */
.subscribe-box {
  margin-top: 20px;
}

input {
  width: 80%;
  max-width: 300px;
  padding: 10px;
  border-radius: 10px;
  border: none;
  outline: none;
  text-align: center;
}

.msg {
  margin-top: 10px;
  font-size: 12px;
  opacity: 0.8;
}

/* CHAT */
.chat-fab {
  position: fixed;
  bottom: 18px;
  right: 18px;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: linear-gradient(135deg,#00c8ff,#0077ff);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  cursor: pointer;
  z-index: 999;
}

.chat-modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: none;
  align-items: flex-end;
  justify-content: center;
  z-index: 1000;
}

.chat-box {
  width: 100%;
  max-width: 420px;
  height: 75vh;
  background: #111;
  border-radius: 18px 18px 0 0;
  overflow: hidden;
}

/* FOOTER */
.footer {
  position: fixed;
  bottom: 0;
  width: 100%;
  padding: 15px;
  background: rgba(0,0,0,0.75);
  text-align: center;
  backdrop-filter: blur(10px);
}

.footer-buttons {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin-bottom: 8px;
  flex-wrap: wrap;
}

.icon-btn {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  border: none;
  background: #222;
  color: white;
  cursor: pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}

.icon-btn img {
  width: 22px;
  height: 22px;
}

/* ADMIN HUB */
.admin-modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 2000;
}

.admin-box {
  width: 90%;
  max-width: 420px;
  background: #111;
  border-radius: 16px;
  padding: 20px;
  text-align: center;
}

.admin-box button {
  width: 100%;
  margin-top: 10px;
  background: linear-gradient(135deg,#00c8ff,#0077ff);
}

.close-btn {
  background: #333 !important;
}

</style>
</head>

<body>

<div class="container">

  <img src="https://eightstudios.org/IMG_7229-removebg-preview.png" class="logo">

  <h1>Coming Soon</h1>
  <p>Something new is on the way from Eight Studios.</p>

  <div class="subscribe-box">
    <input id="emailInput" type="email" placeholder="Enter your email">
    <br>
    <button onclick="subscribe()">Notify Me</button>
    <div class="msg" id="msg"></div>
  </div>

</div>

<!-- CHAT -->
<div class="chat-fab" onclick="openChat()">💬</div>

<div id="chatModal" class="chat-modal" onclick="outsideClose(event)">
  <div class="chat-box">
    <iframe src="https://tawk.to/chat/69febf581262751c34a07c2a/1jo5hmt37"
    style="width:100%; height:100%; border:none;"></iframe>
  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  <div class="footer-buttons">

    <button class="icon-btn" onclick="window.location.href='tel:+15184770592'">📞</button>
    <button class="icon-btn" onclick="window.location.href='sms:5184770592'">💬</button>
    <button class="icon-btn" onclick="window.location.href='download.html'">⬇️</button>

    <button class="icon-btn" onclick="window.open('https://instagram.com/eightstudios','_blank')">
      <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png">
    </button>

    <!-- ADMIN HUB BUTTON -->
    <button class="icon-btn" onclick="openAdmin()">⚙️</button>

  </div>

  <div class="footer-text">© 2026 Eight Studios</div>
</div>

<!-- ADMIN HUB -->
<div id="adminModal" class="admin-modal" onclick="closeAdminOutside(event)">
  <div class="admin-box">

    <h2>Admin Hub</h2>
    <p style="opacity:0.6; font-size:12px;">Quick access dashboards</p>

    <button onclick="window.open('https://dashboard.stripe.com/acct_1SO9tQPqXvDuEmoM/dashboard','_blank')">
      💳 Stripe Dashboard
    </button>

    <button onclick="window.open('https://app.squareup.com/dashboard','_blank')">
      💰 Square Dashboard
    </button>

    <button onclick="window.open('https://dashboard.tawk.to/#/inbox/69febf581262751c34a07c2a/all','_blank')">
      💬 Tawk Inbox
    </button>

    <button class="close-btn" onclick="closeAdmin()">Close</button>

  </div>
</div>

<script>

/* CHAT */
function openChat(){
  document.getElementById("chatModal").style.display = "flex";
}

function outsideClose(e){
  if (e.target.id === "chatModal") {
    document.getElementById("chatModal").style.display = "none";
  }
}

/* EMAIL */
function subscribe() {
  const email = document.getElementById("emailInput").value.trim();
  const msg = document.getElementById("msg");

  if (!email.includes("@")) {
    msg.textContent = "Enter a valid email.";
    return;
  }

  let list = JSON.parse(localStorage.getItem("subscribers")) || [];

  if (list.includes(email)) {
    msg.textContent = "You're already subscribed.";
    return;
  }

  list.push(email);
  localStorage.setItem("subscribers", JSON.stringify(list));

  msg.textContent = "You're on the list 🔥";
  document.getElementById("emailInput").value = "";
}

/* ADMIN HUB */
function openAdmin(){
  document.getElementById("adminModal").style.display = "flex";
}

function closeAdmin(){
  document.getElementById("adminModal").style.display = "none";
}

function closeAdminOutside(e){
  if (e.target.id === "adminModal") {
    closeAdmin();
  }
}

</script>

</body>
</html>
