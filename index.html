<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eight Studios Admin Portal</title>

<link rel="icon" href="https://eightstudios.org/IMG_7229-removebg-preview.png">

<style>
/* ===== GLOBAL ===== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #0a0a0a;
  color: white;
}

/* ===== LOGIN SCREEN ===== */
#loginScreen {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle, #111, #000);
}

.login-box {
  background: #111;
  padding: 30px;
  border-radius: 12px;
  width: 320px;
  text-align: center;
  box-shadow: 0 0 20px rgba(255,255,255,0.08);
}

.login-box h1 {
  margin-bottom: 20px;
}

.login-box input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border: none;
  border-radius: 6px;
}

.login-box button {
  width: 100%;
  padding: 10px;
  background: white;
  color: black;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
}

/* ===== DASHBOARD ===== */
#dashboard {
  display: none;
  min-height: 100vh;
}

.navbar {
  background: #111;
  padding: 15px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid #222;
}

.navbar h2 {
  font-size: 18px;
}

.container {
  padding: 20px;
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
}

/* ===== EMBED SECTION ===== */
.panel {
  background: #111;
  padding: 15px;
  border-radius: 10px;
  border: 1px solid #222;
}

.panel h3 {
  margin-bottom: 10px;
}

/* embedded terminal */
iframe {
  width: 100%;
  height: 700px;
  border: none;
  border-radius: 10px;
}

/* responsive */
@media (min-width: 900px) {
  .container {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <h1>Eight Studios Admin</h1>
    <input type="text" id="user" placeholder="Username">
    <input type="password" id="pass" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <div class="navbar">
    <h2>Eight Studios Admin Portal</h2>
    <button onclick="logout()" style="padding:8px 12px;">Logout</button>
  </div>

  <div class="container">

    <!-- CASH / PAYMENT TERMINAL -->
    <div class="panel">
      <h3>Cash Payment Receiver / Virtual Terminal</h3>

      <!-- EMBED LINK -->
      <iframe src="https://eightstudios.org/cash-payment-receiver-virtual-terminal.html"></iframe>

    </div>

  </div>
</div>

<script>
function login() {
  const user = document.getElementById("user").value;
  const pass = document.getElementById("pass").value;

  // simple demo login (you can replace later with real auth)
  if(user === "admin" && pass === "1234") {
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
  } else {
    alert("Invalid login");
  }
}

function logout() {
  document.getElementById("loginScreen").style.display = "flex";
  document.getElementById("dashboard").style.display = "none";
}
</script>

</body>
</html>
